<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Spotify Widget</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <style>
    /* --- ESTILOS GENERALES --- */
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      overflow: hidden; /* Evita barras de scroll en OBS */
      font-family: 'Montserrat', sans-serif;
      background-color: transparent; /* Fondo transparente para OBS */
    }

    /* Contenedor Principal (Tarjeta) */
    #widget {
      position: relative;
      width: 380px;
      height: 100px;
      background: rgba(18, 18, 18, 0.95);
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 0;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      
      /* Estado inicial oculto para que GSAP lo anime al entrar */
      opacity: 0;
      transform: translateY(50px);
    }

    /* Borde verde brillante lateral */
    #widget::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background-color: #1DB954;
      z-index: 2;
    }

    /* Imagen del Álbum */
    .album-art-container {
      width: 100px;
      height: 100px;
      flex-shrink: 0;
      position: relative;
    }

    #album-art {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* Un pequeño hack para que no se vea borde feo si no hay imagen */
      background-color: #333; 
    }

    /* Información de la canción */
    .info-container {
      flex: 1;
      padding: 0 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
      z-index: 2;
    }

    #track-name {
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      white-space: nowrap;
      margin-bottom: 4px;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    #artist-name {
      color: #b3b3b3;
      font-weight: 500;
      font-size: 13px;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    /* Icono de Spotify pequeño */
    .spotify-logo {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 20px;
      opacity: 0.7;
    }

    /* Barra de Progreso de fondo */
    .progress-bg {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      z-index: 1;
    }

    #progress-bar {
      height: 100%;
      background: #1DB954;
      width: 0%;
      box-shadow: 0 0 10px #1DB954;
    }

  </style>
</head>
<body>

  <div id="widget">
    <div class="album-art-container">
      <img id="album-art" src="" alt="Album Art">
    </div>

    <div class="info-container">
      <div id="track-name">Cargando...</div>
      <div id="artist-name">Esperando datos</div>
    </div>

    <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" class="spotify-logo" alt="Spotify">

    <div class="progress-bg">
      <div id="progress-bar"></div>
    </div>
  </div>

  <script>
    // --- CONFIGURACIÓN ---
    const API_BASE_URL = 'https://api.clamosbot.reexxy.com/api/spotify/now-playing';

    // Obtenemos el canal de la URL (?channel=nombre)
    const params = new URLSearchParams(window.location.search);
    const CHANNEL = params.get('channel');

    // Referencias al DOM
    const widget = document.getElementById('widget');
    const trackNameEl = document.getElementById('track-name');
    const artistNameEl = document.getElementById('artist-name');
    const albumArtEl = document.getElementById('album-art');
    const progressBar = document.getElementById('progress-bar');

    let isVisible = false;
    let currentSongUrl = ''; 

    async function updateWidget() {
      if (!CHANNEL) {
        trackNameEl.innerText = "Error: Falta ?channel=";
        gsap.to(widget, { opacity: 1, y: 0 });
        return;
      }

      try {
        const response = await fetch(`${API_BASE_URL}?channel=${CHANNEL}`);
        const data = await response.json();

        console.log(data)

        if (!data.isPlaying) {
          if (isVisible) {
            animateOut();
          }
          return;
        }

        trackNameEl.innerText = data.title;
        artistNameEl.innerText = data.artists || data.artist;
        
        if (data.songUrl !== currentSongUrl) {
           albumArtEl.src = data.albumImageUrl;
           currentSongUrl = data.songUrl;
           
           gsap.fromTo([trackNameEl, artistNameEl], 
             { opacity: 0, x: -10 }, 
             { opacity: 1, x: 0, duration: 0.5, stagger: 0.1 }
           );
        }

        if (data.progress && data.duration) {
          const percentage = (data.progress / data.duration) * 100;
          gsap.to(progressBar, {
            width: `${percentage}%`,
            duration: 1, 
            ease: "linear"
          });
        }

        if (!isVisible) {
          animateIn();
        }

      } catch (error) {
        console.error("Error conectando con API:", error);
      }
    }

    function animateIn() {
      isVisible = true;
      gsap.to(widget, {
        opacity: 1,
        y: 0,
        duration: 0.8,
        ease: "back.out(1.7)" 
      });
    }

    function animateOut() {
      isVisible = false;
      gsap.to(widget, {
        opacity: 0,
        y: 50,
        duration: 0.5,
        ease: "power2.in"
      });
    }

    setInterval(updateWidget, 3000);
    updateWidget();

  </script>
</body>
</html>
